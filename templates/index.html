<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiteChart</title>
<script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg: #131722; --panel: #1b2027; --panel2: #22262f; --border: #2a2e39;
    --text: #d1d4dc; --text2: #787b86; --accent: #2962ff;
    --green: #26a69a; --red: #ef5350;
    --yellow: #f0b90b; --orange: #ff9800; --purple: #e040fb; --cyan: #26c6da; --blue: #42a5f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; font-size: 13px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  button { font-family: inherit; }

  /* ── Top toolbar ── */
  #topbar {
    display: flex; align-items: center; gap: 4px; height: 42px;
    padding: 0 8px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .divider { width: 1px; height: 22px; background: var(--border); margin: 0 6px; }
  #symbol {
    height: 30px; width: 130px; padding: 0 10px; background: transparent; color: var(--text);
    border: none; border-radius: 4px; font-size: 15px; font-weight: 700; letter-spacing: .3px;
  }
  #symbol:hover, #symbol:focus { background: var(--panel); outline: none; }
  /* Symbol search autocomplete */
  .sym-wrap { position: relative; display: inline-flex; }
  #sym-suggest {
    position: fixed; z-index: 65; min-width: 280px; max-height: 360px; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 4px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none;
  }
  #sym-suggest.open { display: block; }
  .sug-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 9px; border-radius: 5px;
    cursor: pointer; white-space: nowrap;
  }
  .sug-item:hover, .sug-item.active { background: var(--panel2); }
  .sug-sym { font-weight: 700; font-size: 13px; color: var(--text); min-width: 62px; }
  .sug-name { color: var(--text2); font-size: 12px; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .sug-ex { color: var(--text2); font-size: 10px; letter-spacing: .3px; opacity: .8; }
  .sug-empty { color: var(--text2); font-size: 12px; padding: 8px 9px; }
  /* Watchlist */
  #wl-star { padding: 0 8px; }
  #wl-star svg { transition: fill .12s, color .12s; }
  #wl-star.on { color: var(--yellow); }
  #wl-star.on svg { fill: var(--yellow); }
  .wl-wrap { position: relative; display: inline-flex; }
  #wl-menu {
    position: fixed; z-index: 60; min-width: 200px; max-height: 420px; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none;
  }
  #wl-menu.open { display: block; }
  .wl-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px 8px; }
  .wl-head b { font-size: 13px; }
  #wl-close { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 18px; line-height: 1; }
  #wl-close:hover { color: var(--text); }
  .wl-item {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 7px 8px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text);
  }
  .wl-item:hover { background: var(--panel2); }
  .wl-item.on { background: rgba(41,98,255,0.14); color: #5b8dff; }
  .wl-item .wl-rm { display: none; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px; }
  .wl-item:hover .wl-rm { display: inline; }
  .wl-item .wl-rm:hover { color: var(--red); }
  .wl-empty { color: var(--text2); font-size: 12px; padding: 6px 8px; }
  .wl-empty.hidden { display: none; }
  .tf {
    height: 28px; min-width: 30px; padding: 0 8px; background: transparent; color: var(--text2);
    border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .tf:hover { background: var(--panel); color: var(--text); }
  .tf.active { background: rgba(41,98,255,0.15); color: #5b8dff; }
  .tf-more { display: inline-flex; align-items: center; gap: 2px; color: var(--text2); }
  .tf-more .tf-more-label:not(:empty) { margin-right: 2px; color: #5b8dff; }
  #tf-menu {
    position: fixed; z-index: 46; min-width: 90px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none;
    max-height: calc(100vh - 12px); overflow-y: auto;
  }
  #tf-menu.open { display: block; }
  #tf-menu h4 { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin: 8px 8px 4px; }
  #tf-menu h4:first-child { margin-top: 2px; }
  .tf-menu-row {
    padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 13px; color: var(--text); font-weight: 600;
  }
  .tf-menu-row:hover { background: var(--panel2); }
  .tf-menu-row.on { background: rgba(41,98,255,0.12); color: #5b8dff; }
  .tb-btn {
    display: flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px; background: transparent;
    color: var(--text2); border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .tb-btn:hover { background: var(--panel); color: var(--text); }
  .spacer { flex: 1; }

  /* ── Body: left rail + chart ── */
  #body { flex: 1; display: flex; min-height: 0; }
  #rail {
    width: 46px; flex-shrink: 0; background: var(--bg); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 6px 0; gap: 3px;
  }
  .tool {
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--text2); border: none; border-radius: 6px; cursor: pointer;
    font-size: 16px;
  }
  .tool:hover { background: var(--panel); color: var(--text); }
  .tool.active { background: rgba(41,98,255,0.18); color: #5b8dff; }
  .tool svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .rail-sep { width: 26px; height: 1px; background: var(--border); margin: 4px 0; }

  /* Rail groups with fly-out arrow */
  .rail-group { position: relative; display: flex; align-items: center; }
  .rail-arrow {
    position: absolute; right: -1px; bottom: -1px; width: 12px; height: 12px; padding: 0;
    display: flex; align-items: center; justify-content: center; background: transparent;
    color: var(--text2); border: none; cursor: pointer; border-radius: 3px;
  }
  .rail-group:hover .rail-arrow { color: var(--text); }
  .rail-arrow svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.4; transform: rotate(-90deg); }

  /* Tool fly-out menu */
  #tool-flyout {
    position: fixed; z-index: 45; min-width: 220px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none;
    max-height: calc(100vh - 12px); overflow-y: auto;
  }
  #tool-flyout.open { display: block; }
  #tool-flyout h4 { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin: 8px 8px 4px; }
  #tool-flyout h4:first-child { margin-top: 2px; }
  .fly-row { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 5px; cursor: pointer; }
  .fly-row:hover { background: var(--panel2); }
  .fly-row.on { background: rgba(41,98,255,0.12); }
  .fly-ic { display: flex; color: var(--text); }
  .fly-ic svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .fly-lb { flex: 1; font-size: 13px; color: var(--text); }
  .fly-hint { font-size: 11px; color: var(--text2); }

  #main { flex: 1; display: flex; min-height: 0; position: relative; }
  #chart-wrap { flex: 1; position: relative; min-width: 0; }
  #chart { position: absolute; inset: 0; }

  /* On-chart legends */
  .legend {
    position: absolute; left: 12px; z-index: 5; pointer-events: none; font-size: 12px; line-height: 1.5;
    white-space: nowrap; text-shadow: 0 0 3px var(--bg), 0 0 3px var(--bg), 0 0 3px var(--bg);
  }
  .legend b { font-weight: 700; }
  .legend .k { color: var(--text2); margin-left: 6px; }

  /* Indicators dropdown */
  #ind-menu {
    position: fixed; top: 44px; left: 50%; z-index: 60; width: 300px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none;
  }
  #ind-menu.open { display: block; }
  #ind-menu .ind-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  #ind-menu .ind-head b { font-size: 14px; }
  #ind-close { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; }
  #ind-close:hover { color: var(--text); }
  #ind-search {
    width: 100%; height: 30px; padding: 0 10px; margin-bottom: 6px; background: var(--panel2);
    color: var(--text); border: 1px solid var(--border); border-radius: 5px; font-size: 13px;
  }
  #ind-search:focus { outline: none; border-color: var(--accent); }
  #ind-list { max-height: 360px; overflow-y: auto; }
  #ind-menu h4 { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin: 8px 6px 4px; }
  .ind-add { display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 13px; padding: 6px 8px; border-radius: 4px; }
  .ind-add:hover { background: var(--panel2); }
  .ind-add .add-plus { color: var(--text2); font-size: 16px; }
  .ind-add:hover .add-plus { color: var(--accent); }
  .ind-add.hidden { display: none; }
  .dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

  /* Legend rows with per-indicator controls */
  .lg-row { display: flex; align-items: center; gap: 2px; }
  .lg-row .k { color: var(--text2); margin-left: 4px; }
  .lg-name { color: var(--text2); font-size: 12px; margin-left: 6px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lg-osc { position: absolute; left: 0; white-space: nowrap; }
  .ind-row .lg-btns { display: none; margin-left: 6px; pointer-events: auto; }
  .ind-row:hover .lg-btns { display: inline-flex; gap: 1px; }
  .lg-btn { background: transparent; border: none; color: var(--text2); cursor: pointer; padding: 1px 2px; border-radius: 3px; }
  .lg-btn:hover { color: var(--text); background: var(--panel2); }
  .lg-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; display: block; }
  .legend { pointer-events: none; }
  .legend .ind-row { pointer-events: auto; }

  /* Settings popover — floats inline, anchored under the indicator's gear */
  #settings { position: fixed; inset: 0; z-index: 40; display: none; }
  #settings.open { display: block; }
  #settings .dlg-backdrop { position: absolute; inset: 0; background: transparent; }
  .dlg-box { position: absolute; width: 320px; max-height: 70vh; display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
  .dlg-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
  .dlg-head h3 { font-size: 16px; font-weight: 700; }
  #dlg-close { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; }
  #dlg-close:hover { color: var(--text); }
  .dlg-tabs { display: flex; gap: 18px; padding: 0 16px; border-bottom: 1px solid var(--border); }
  .dlg-tab { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 0; border-bottom: 2px solid transparent; }
  .dlg-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .dlg-body { padding: 16px; overflow-y: auto; }
  .dlg-field { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .dlg-group { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin: 16px 0 8px; font-weight: 600; }
  .dlg-group:first-child { margin-top: 0; }
  .dlg-field label { color: var(--text2); font-size: 13px; }
  .dlg-field.disabled { opacity: 0.4; }
  .dlg-field input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }
  .dlg-field input, .dlg-field select { width: 130px; height: 30px; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 0 8px; font-size: 13px; }
  .dlg-field input:focus, .dlg-field select:focus { outline: none; border-color: var(--accent); }
  .dlg-style-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dlg-style-row .dlg-plot { flex: 1; color: var(--text2); font-size: 13px; }
  .dlg-style-row input[type=color] { width: 34px; height: 26px; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 0; cursor: pointer; }
  .dlg-style-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); }
  .dlg-style-row select { height: 26px; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
  .dlg-empty { color: var(--text2); font-size: 13px; }
  .dlg-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .dlg-foot button { height: 32px; padding: 0 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); cursor: pointer; font-size: 13px; }
  .dlg-foot button:hover { border-color: var(--accent); }
  #dlg-ok, #draw-ok { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

  /* Drawing settings dialog (shares .dlg-* styles) */
  #draw-settings { position: fixed; inset: 0; z-index: 60; display: none; }
  #draw-settings.open { display: block; }
  #draw-settings .dlg-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.25); }
  #draw-settings .dlg-box { width: 340px; }
  .fib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
  .fib-lvl { display: flex; align-items: center; gap: 6px; }
  .fib-lvl input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); flex-shrink: 0; }
  .fib-lvl input[type=number] { flex: 1; width: 100%; height: 26px; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 0 6px; font-size: 12px; }
  .fib-lvl input[type=color] { width: 30px; height: 24px; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 0; cursor: pointer; flex-shrink: 0; }
  .coord-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .coord-row .coord-label { color: var(--text2); font-size: 13px; width: 90px; }
  .coord-row input { flex: 1; height: 30px; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 0 8px; font-size: 13px; }
  .coord-row input:focus { outline: none; border-color: var(--accent); }

  /* ── Alerts side panel ── */
  #alerts-panel {
    position: fixed; top: 42px; right: 0; bottom: 0; width: 340px; z-index: 45;
    background: var(--panel); border-left: 1px solid var(--border);
    display: none; flex-direction: column; box-shadow: -8px 0 30px rgba(0,0,0,0.4);
  }
  #alerts-panel.open { display: flex; }
  .ap-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; }
  .ap-head b { font-size: 15px; }
  .ap-head-btns { display: flex; align-items: center; gap: 8px; }
  .ap-new { background: var(--accent); color: #fff; border: none; border-radius: 5px; padding: 6px 10px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .ap-new:hover { opacity: .9; }
  #alerts-close { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; }
  #alerts-close:hover { color: var(--text); }
  .ap-tabs { display: flex; gap: 18px; padding: 0 14px; border-bottom: 1px solid var(--border); }
  .ap-tab { background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 0; border-bottom: 2px solid transparent; }
  .ap-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .ap-body { flex: 1; overflow-y: auto; padding: 10px; }
  .al-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .al-card.off { opacity: .55; }
  .al-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .al-card .al-sym { font-weight: 700; font-size: 14px; }
  .al-card .al-tf { color: var(--text2); font-size: 11px; margin-left: 6px; }
  .al-card .al-desc { color: var(--text); font-size: 12px; margin-top: 5px; word-break: break-word; }
  .al-card .al-meta { color: var(--text2); font-size: 11px; margin-top: 4px; }
  .al-card .al-actions { display: flex; gap: 6px; margin-top: 8px; }
  .al-card .al-actions button { flex: 1; height: 26px; border-radius: 5px; border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; font-size: 11px; }
  .al-card .al-actions button:hover { border-color: var(--accent); }
  .al-card .al-actions .al-del:hover { border-color: var(--red); color: var(--red); }
  .al-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .al-badge.on { background: rgba(38,166,154,0.2); color: var(--green); }
  .al-badge.paused { background: rgba(120,123,134,0.2); color: var(--text2); }
  .ap-empty { color: var(--text2); font-size: 12px; text-align: center; padding: 20px; }
  .al-log-item { border-bottom: 1px solid var(--border); padding: 8px 4px; font-size: 12px; }
  .al-log-item .lt { color: var(--text2); font-size: 10px; }
  .al-log-item .lok { color: var(--green); }
  .al-log-item .lerr { color: var(--red); }

  /* ── Alert dialog ── */
  #alert-dlg { position: fixed; inset: 0; z-index: 70; display: none; }
  #alert-dlg.open { display: block; }
  #alert-dlg .dlg-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
  #alert-dlg .dlg-box { width: 380px; max-height: 86vh; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #alert-dlg .dlg-field input, #alert-dlg .dlg-field select { width: 200px; }
  .al-msg-wrap { margin-top: 4px; }
  .al-msg-wrap label { color: var(--text2); font-size: 12px; display: block; margin-bottom: 5px; }
  #al-message { width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 8px; font-size: 12px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace; resize: vertical; }
  #al-message:focus { outline: none; border-color: var(--accent); }
  .al-hint { color: var(--text2); font-size: 11px; margin-top: 6px; line-height: 1.5; }
  .al-hint code { background: var(--panel2); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; cursor: pointer; color: var(--blue); }
  .al-hint code:hover { border-color: var(--accent); }
  .al-preview { margin-top: 10px; font-size: 12px; color: var(--text2); min-height: 16px; }
  .al-preview.fires { color: var(--green); }
  .al-preview.nofire { color: var(--text2); }
  .al-preview.err { color: var(--red); }

  /* Ticker symbol/name in the legend are clickable → opens the Overview panel */
  .legend .clickable { cursor: pointer; pointer-events: auto; transition: opacity .12s; }
  .legend .clickable:hover { opacity: .75; }

  /* ── Overview (fundamentals + analyst) dialog ── */
  #overview-dlg { position: fixed; inset: 0; z-index: 70; display: none; }
  #overview-dlg.open { display: block; }
  #overview-dlg .dlg-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
  #overview-dlg .dlg-box { width: 420px; max-height: 82vh; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  .ov-head-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .ov-sym { font-size: 18px; font-weight: 700; }
  .ov-name { color: var(--text2); font-size: 13px; }
  .ov-sub { color: var(--text2); font-size: 12px; margin-top: 2px; }
  .ov-price-row { display: flex; align-items: baseline; gap: 10px; margin-top: 10px; }
  .ov-price { font-size: 22px; font-weight: 700; }
  .ov-range { color: var(--text2); font-size: 11px; margin-top: 8px; }
  .ov-range-bar { position: relative; height: 4px; background: var(--panel2); border-radius: 2px; margin-top: 4px; }
  .ov-range-dot { position: absolute; top: -3px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); transform: translateX(-50%); }
  .ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; margin-top: 6px; }
  .ov-stat .ov-k { color: var(--text2); font-size: 11px; }
  .ov-stat .ov-v { font-size: 13px; font-weight: 600; margin-top: 1px; }
  .ov-rec-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .ov-rec-badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 12px; text-transform: capitalize; }
  .ov-rec-badge.buy, .ov-rec-badge.strong_buy { background: rgba(38,166,154,0.18); color: var(--green); }
  .ov-rec-badge.hold { background: rgba(240,185,11,0.18); color: var(--yellow); }
  .ov-rec-badge.sell, .ov-rec-badge.strong_sell, .ov-rec-badge.underperform { background: rgba(239,83,80,0.18); color: var(--red); }
  .ov-rec-badge.none { background: var(--panel2); color: var(--text2); }
  .ov-target-bar { position: relative; height: 6px; background: var(--panel2); border-radius: 3px; margin-top: 10px; }
  .ov-target-fill { position: absolute; top: 0; bottom: 0; background: rgba(41,98,255,0.35); border-radius: 3px; }
  .ov-target-dot { position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); transform: translateX(-50%); }
  .ov-target-labels { display: flex; justify-content: space-between; color: var(--text2); font-size: 11px; margin-top: 4px; }
  .ov-summary { color: var(--text); font-size: 12px; line-height: 1.6; margin-top: 6px; max-height: 110px; overflow-y: auto; }
  .ov-empty { color: var(--text2); font-size: 13px; text-align: center; padding: 24px 8px; }

  /* ── Screener tab ── */
  .tab-btn.active { color: var(--text); background: var(--panel); }
  #screener-view { flex: 1; min-height: 0; display: none; flex-direction: column; overflow: hidden; }
  #screener-view.open { display: flex; }
  #scr-controls {
    display: flex; align-items: center; gap: 14px; padding: 10px 14px;
    border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
  }
  #scr-rules { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .scr-rule-chk { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); cursor: pointer; user-select: none; }
  .scr-rule-chk input { accent-color: var(--accent); cursor: pointer; }
  .scr-ctl-group { display: flex; align-items: center; gap: 6px; }
  .scr-lbl { color: var(--text2); font-size: 12px; }
  #scr-tf {
    height: 28px; padding: 0 8px; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit;
  }
  .scr-scan-btn { background: var(--accent); color: #fff; font-weight: 700; padding: 0 14px; }
  .scr-scan-btn:hover { background: #1e53e5; color: #fff; }
  .scr-scan-btn:disabled { opacity: .55; cursor: default; }
  .scr-summary { color: var(--text2); font-size: 12px; }
  #scr-table-wrap { flex: 1; min-height: 0; overflow: auto; padding: 0 14px 14px; }
  #scr-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #scr-table th {
    position: sticky; top: 0; background: var(--bg); text-align: left; color: var(--text2);
    font-weight: 600; padding: 10px 10px 8px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  #scr-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  #scr-table tbody tr { cursor: pointer; }
  #scr-table tbody tr:hover { background: var(--panel); }
  .scr-sym { font-weight: 700; font-size: 13px; }
  .scr-chg.up { color: var(--green); }
  .scr-chg.down { color: var(--red); }
  .scr-badge {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px;
    border-radius: 10px; white-space: nowrap;
  }
  .scr-badge.buy { background: rgba(38,166,154,0.18); color: var(--green); }
  .scr-badge.sell { background: rgba(239,83,80,0.18); color: var(--red); }
  .scr-badge.neutral { background: var(--panel2); color: var(--text2); }
  .scr-badge-label { color: var(--text2); font-size: 10px; margin-top: 3px; display: block; }
  .scr-row-err { color: var(--text2); font-style: italic; }
  .scr-empty { color: var(--text2); font-size: 13px; text-align: center; padding: 40px 8px; }
  .ov-loading { color: var(--text2); font-size: 13px; text-align: center; padding: 24px 8px; }

  /* Floating drawing toolbar (appears on select) */
  #draw-toolbar {
    position: fixed; z-index: 55; display: none; align-items: center; gap: 2px;
    padding: 3px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }
  #draw-toolbar.open { display: flex; }
  #draw-toolbar .dt-grip { color: var(--text2); font-size: 11px; padding: 0 3px; cursor: grab; letter-spacing: -2px; user-select: none; }
  #draw-toolbar .dt-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    min-width: 30px; height: 30px; padding: 0 6px; border: none; background: transparent;
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #draw-toolbar .dt-btn:hover { background: var(--panel2); }
  #draw-toolbar .dt-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  #draw-toolbar .dt-swatch { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border); background: linear-gradient(90deg,#f23645,#ff9800,#4caf50,#00bcd4,#2962ff,#e040fb); }
  #dt-color-input { position: fixed; width: 0; height: 0; opacity: 0; border: none; padding: 0; }
  #dt-width-menu {
    position: fixed; z-index: 56; display: none; flex-direction: column; padding: 4px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }
  #dt-width-menu.open { display: flex; }
  #dt-width-menu button { background: transparent; border: none; color: var(--text); cursor: pointer; padding: 6px 14px; border-radius: 5px; font-size: 12px; text-align: left; }
  #dt-width-menu button:hover { background: var(--panel2); }

  /* Bottom timeframe strip */
  #bottombar {
    display: flex; align-items: center; gap: 2px; height: 30px; padding: 0 8px; background: var(--bg);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #bottombar .brand { color: var(--text2); font-size: 11px; margin-right: 8px; }
  #status { margin-left: auto; color: var(--text2); font-size: 11px; }
  #status.error { color: var(--red); }
</style>
</head>
<body>
  <!-- Top toolbar -->
  <div id="topbar">
    <div class="sym-wrap">
      <input id="symbol" placeholder="Symbol" value="AAPL" spellcheck="false" autocomplete="off" />
      <div id="sym-suggest"></div>
    </div>
    <button class="tb-btn" id="wl-star" title="Add to watchlist">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
        <path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8L3.5 9.7l5.9-.9z"/>
      </svg>
    </button>
    <div class="wl-wrap">
      <button class="tb-btn" id="wl-toggle" title="Watchlist">Watchlist &#9662;</button>
      <div id="wl-menu">
        <div class="wl-head"><b>Watchlist</b><button id="wl-close" title="Close">&times;</button></div>
        <div id="wl-list"></div>
        <div id="wl-empty" class="wl-empty">No symbols yet — add one with the star.</div>
      </div>
    </div>
    <div class="divider"></div>
    <div id="tfs" style="display:flex;gap:2px"></div>
    <div class="divider"></div>
    <button class="tb-btn" id="ind-toggle">&fnof; Indicators</button>
    <div class="divider"></div>
    <button class="tb-btn" id="alert-toggle" title="Alerts">&#9200; Alerts</button>
    <div class="divider"></div>
    <button class="tb-btn tab-btn active" id="tab-chart-btn">Chart</button>
    <button class="tb-btn tab-btn" id="tab-screener-btn">&#128269; Screener</button>
    <div class="spacer"></div>
  </div>

  <div id="body">
    <!-- Left drawing rail -->
    <div id="rail"></div>

    <div id="main">
      <div id="chart-wrap">
        <div id="chart"></div>
        <div class="legend" id="lg-price" style="top:8px"></div>
        <div class="legend" id="lg-panes"></div>
      </div>

      <!-- Indicators dropdown -->
      <div id="ind-menu">
        <div class="ind-head"><b>Indicators</b><button id="ind-close" title="Close">&times;</button></div>
        <input id="ind-search" placeholder="Search indicators…" autocomplete="off" spellcheck="false" />
        <div id="ind-list"></div>
      </div>
    </div>
  </div>

  <!-- Screener tab: scans Watchlist tickers, one BUY/SELL/NEUTRAL verdict
       per selected rule, using the same indicator math as the chart. No
       chart/candle data is stored — it's computed fresh on every scan. -->
  <div id="screener-view">
    <div id="scr-controls">
      <div id="scr-rules"></div>
      <div class="scr-ctl-group">
        <label class="scr-lbl">Timeframe</label>
        <select id="scr-tf"></select>
      </div>
      <button class="tb-btn scr-scan-btn" id="scr-scan">&#9654; Scan</button>
      <div class="spacer"></div>
      <span id="scr-summary" class="scr-summary"></span>
    </div>
    <div id="scr-table-wrap">
      <table id="scr-table">
        <thead><tr id="scr-thead"></tr></thead>
        <tbody id="scr-tbody"></tbody>
      </table>
      <div id="scr-empty" class="scr-empty"></div>
    </div>
  </div>

  <!-- Bottom timeframe strip -->
  <div id="bottombar">
    <span class="brand">LiteChart</span>
    <div id="tfs-bottom" style="display:flex;gap:2px"></div>
    <span id="status">Ready</span>
  </div>

  <!-- Indicator settings popover (anchored inline under the indicator) -->
  <div id="settings">
    <div class="dlg-backdrop"></div>
    <div class="dlg-box">
      <div class="dlg-head">
        <h3 id="dlg-title">Indicator</h3>
        <button id="dlg-close">&times;</button>
      </div>
      <div class="dlg-tabs">
        <button class="dlg-tab active" data-tab="inputs">Inputs</button>
        <button class="dlg-tab" data-tab="style">Style</button>
      </div>
      <div class="dlg-body">
        <div id="tab-inputs"></div>
        <div id="tab-style" style="display:none"></div>
      </div>
      <div class="dlg-foot">
        <button id="dlg-apply">Apply</button>
        <button id="dlg-cancel">Cancel</button>
        <button id="dlg-ok">Ok</button>
      </div>
    </div>
  </div>

  <div id="draw-settings">
    <div class="dlg-backdrop"></div>
    <div class="dlg-box">
      <div class="dlg-head">
        <h3 id="draw-title">Drawing</h3>
        <button id="draw-close">&times;</button>
      </div>
      <div class="dlg-tabs">
        <button class="dlg-tab active" data-dtab="style">Style</button>
        <button class="dlg-tab" data-dtab="coords">Coordinates</button>
      </div>
      <div class="dlg-body">
        <div id="dtab-style"></div>
        <div id="dtab-coords" style="display:none"></div>
      </div>
      <div class="dlg-foot">
        <button id="draw-cancel">Cancel</button>
        <button id="draw-ok">Ok</button>
      </div>
    </div>
  </div>

  <div id="draw-toolbar">
    <span class="dt-grip">⋮⋮</span>
    <button class="dt-btn" id="dt-color" title="Color">
      <span class="dt-swatch"></span>
    </button>
    <input type="color" id="dt-color-input" />
    <button class="dt-btn" id="dt-width" title="Line width"><span id="dt-width-label">2px</span></button>
    <div id="dt-width-menu"></div>
    <button class="dt-btn" id="dt-settings" title="Settings"></button>
    <button class="dt-btn" id="dt-delete" title="Delete"></button>
  </div>

  <!-- Alerts side panel: list of alerts + fired log -->
  <div id="alerts-panel">
    <div class="ap-head">
      <b>Alerts</b>
      <div class="ap-head-btns">
        <button id="alert-new" class="ap-new">+ New alert</button>
        <button id="alerts-close" title="Close">&times;</button>
      </div>
    </div>
    <div class="ap-tabs">
      <button class="ap-tab active" data-atab="list">Alerts</button>
      <button class="ap-tab" data-atab="log">Log</button>
    </div>
    <div id="ap-list" class="ap-body"></div>
    <div id="ap-log" class="ap-body" style="display:none"></div>
  </div>

  <!-- Create / edit alert dialog -->
  <div id="alert-dlg">
    <div class="dlg-backdrop"></div>
    <div class="dlg-box">
      <div class="dlg-head">
        <h3 id="alert-dlg-title">Create Alert</h3>
        <button id="alert-dlg-close">&times;</button>
      </div>
      <div class="dlg-body">
        <div class="dlg-group">CONDITION</div>
        <div class="dlg-field"><label>Symbol</label><input id="al-symbol" spellcheck="false" /></div>
        <div class="dlg-field"><label>Timeframe</label>
          <select id="al-tf">
            <option>1m</option><option>5m</option><option>15m</option><option>30m</option>
            <option>1h</option><option>4h</option><option selected>1D</option>
            <option>1W</option><option>1M</option>
          </select>
        </div>

        <div class="dlg-field"><label>Left</label>
          <select id="al-left-kind"><option value="price">Price</option><option value="indicator">Indicator</option></select>
        </div>
        <div class="dlg-field al-left-price"><label>Source</label><select id="al-left-source"></select></div>
        <div class="dlg-field al-left-ind" style="display:none"><label>Indicator</label><select id="al-left-ind"></select></div>
        <div class="dlg-field al-left-ind" style="display:none"><label>Plot</label><select id="al-left-plot"></select></div>
        <div id="al-left-params"></div>

        <div class="dlg-field"><label>Condition</label><select id="al-op"></select></div>

        <div class="dlg-field"><label>Right</label>
          <select id="al-right-kind">
            <option value="value">Value</option>
            <option value="price">Price</option>
            <option value="indicator">Indicator</option>
          </select>
        </div>
        <div class="dlg-field al-right-value"><label>Value</label><input id="al-right-value" type="number" step="any" value="0" /></div>
        <div class="dlg-field al-right-price" style="display:none"><label>Source</label><select id="al-right-source"></select></div>
        <div class="dlg-field al-right-ind" style="display:none"><label>Indicator</label><select id="al-right-ind"></select></div>
        <div class="dlg-field al-right-ind" style="display:none"><label>Plot</label><select id="al-right-plot"></select></div>
        <div id="al-right-params"></div>

        <div class="dlg-group">TRIGGER</div>
        <div class="dlg-field"><label>Frequency</label>
          <select id="al-mode">
            <option value="once">Once (then stop)</option>
            <option value="recurring">Every time (recurring)</option>
          </select>
        </div>

        <div class="dlg-group">WEBHOOK</div>
        <div class="dlg-field" style="align-items:flex-start"><label>URL</label>
          <input id="al-webhook" placeholder="https://…" spellcheck="false" style="width:220px" />
        </div>
        <div class="al-msg-wrap">
          <label>Message (JSON or text)</label>
          <textarea id="al-message" spellcheck="false" rows="5"></textarea>
          <div class="al-hint" id="al-placeholders"></div>
        </div>
        <div class="al-preview" id="al-preview"></div>
      </div>
      <div class="dlg-foot">
        <button id="al-test">Test</button>
        <button id="al-cancel">Cancel</button>
        <button id="al-save">Create</button>
      </div>
    </div>
  </div>

  <!-- Overview: fundamentals + analyst-opinion snapshot for the active ticker -->
  <div id="overview-dlg">
    <div class="dlg-backdrop"></div>
    <div class="dlg-box">
      <div class="dlg-head">
        <h3>Overview</h3>
        <button id="overview-close">&times;</button>
      </div>
      <div class="dlg-body" id="overview-body">
        <div class="ov-loading">Loading…</div>
      </div>
    </div>
  </div>

<script src="/static/app.js?v={{ ver }}"></script>
</body>
</html>
